{% extends "base.html" %}

{% block title %}
Delete Address
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body text-center">

<h3>

Delete Address

</h3>

<p class="mt-4">

Are you sure you want to delete

<strong>

{{ address.title }}

</strong>

?

</p>

<form method="POST">

{% csrf_token %}

<button
class="btn btn-danger">

Delete

</button>

<a
href="{% url 'address-list' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
