{% extends "owner/base_owner.html" %}

{% block owner_content %}

<div class="card shadow">

    <div class="card-header">

        <h3>{{ title }}</h3>

    </div>

    <div class="card-body">

        <form
            method="POST"
            enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-success">

                Save

            </button>

            <a
                href="{% url 'owner-menu-list' %}"
                class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
